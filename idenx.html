<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeatSync - Teatro don Bosco</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 text-gray-800 font-sans p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="max-w-5xl w-full mx-auto bg-white p-6 md:p-8 rounded-xl shadow-xl flex flex-col md:flex-row gap-8">
        
        <div class="flex-1">
            <h2 class="text-2xl font-extrabold text-gray-900 mb-6">Teatro don Bosco - Seating</h2>
            
            <div id="seat-grid" class="grid grid-cols-5 gap-3">
                <button class="p-4 bg-green-100 border-2 border-green-500 text-green-700 rounded-lg font-bold hover:bg-green-200 transition">
                    1 <br><span class="text-xs">[E]</span>
                </button>
            </div>
        </div>

        <div class="w-full md:w-1/3 flex flex-col gap-6">
            
            <div class="bg-blue-50 p-6 rounded-xl border border-blue-100 shadow-sm">
                <h3 class="text-xl font-bold mb-2">Book a Ticket</h3>
                <p class="mb-4 text-sm text-gray-600">Selected Seat: <span id="display-selected-seat" class="font-bold text-blue-600 text-lg border-b-2 border-blue-600">None</span></p>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1 text-gray-700">Customer Name</label>
                        <input type="text" id="input-customer-name" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="e.g., Jane Doe">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold mb-1 text-gray-700">Ticket Type</label>
                        <select id="input-ticket-type" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            <option value="">-- Select Type --</option>
                            <option value="A">Adult ($15.00)</option>
                            <option value="C">Child ($8.00)</option>
                        </select>
                    </div>
                    
                    <button id="btn-book" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition shadow-md">Confirm Booking</button>
                </div>
            </div>

            <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 shadow-sm">
                <h3 class="text-xl font-bold mb-4">Revenue Report</h3>
                
                <ul class="space-y-3 mb-6 text-gray-700">
                    <li class="flex justify-between items-center">
                        <span>Adult Tickets (A):</span> 
                        <span id="stat-adults" class="font-bold bg-white px-3 py-1 rounded border">0</span>
                    </li>
                    <li class="flex justify-between items-center">
                        <span>Child Tickets (C):</span> 
                        <span id="stat-children" class="font-bold bg-white px-3 py-1 rounded border">0</span>
                    </li>
                    <li class="flex justify-between items-center text-xl mt-4 pt-4 border-t border-gray-300">
                        <strong>Total:</strong> 
                        <strong id="stat-revenue" class="text-green-600">$0.00</strong>
                    </li>
                </ul>
                
                <button id="btn-clear-all" class="w-full border-2 border-red-500 text-red-600 font-bold py-2 rounded hover:bg-red-50 hover:text-red-700 transition">
                    Clear All Bookings
                </button>
            </div>

        </div>
    </div>

</body>
</html>
